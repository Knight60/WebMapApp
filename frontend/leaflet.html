<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leaflet Demo</title>
    <style>
      html, body { margin: 0; height: 100%; }
      #app { height: 100%; }

      .province-picker {
        background: #fff;
        padding: 8px 10px;
        border-radius: 6px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
        font: 13px/1.4 system-ui, 'Segoe UI', Roboto, sans-serif;
      }
      .province-picker label {
        display: block;
        margin-bottom: 4px;
        font-weight: 600;
        color: #1f2937;
      }
      .province-picker select {
        width: 220px;
        max-width: 60vw;
        padding: 5px 6px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        font: inherit;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/leaflet-demo.ts"></script>
  </body>
</html>
